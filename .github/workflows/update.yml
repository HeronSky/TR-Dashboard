name: Update TRA Timetable

on:
  schedule:
    - cron: '0 19 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: update-tra-timetable-main
  cancel-in-progress: false

jobs:
  update-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python 3.10
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          if [ -f requirements.txt ]; then
            pip install -r requirements.txt
          fi

      - name: Commit and push changes
        shell: bash
        env:
          TDX_CLIENT_ID: ${{ secrets.TDX_CLIENT_ID }}
          TDX_CLIENT_SECRET: ${{ secrets.TDX_CLIENT_SECRET }}
        run: |
          set -euo pipefail

          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"

          success=0
          for i in 1 2 3; do
            echo "Attempt $i: pull --rebase -> regenerate/add -> commit -> push"

            git reset --hard HEAD
            git clean -fd

            git pull --rebase origin main

            python api_tra.py

            git add data/*.json || true

            if git diff --staged --quiet; then
              echo "No changes to commit"
              exit 0
            fi

            git commit -m "chore: auto-update timetable"

            if git push origin HEAD:main; then
              success=1
              break
            fi

            echo "Push failed (attempt $i), retrying in 3s..."
            sleep 3
          done

          if [ "$success" -ne 1 ]; then
            echo "Failed to push after 3 attempts"
            exit 1
          